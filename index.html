<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 감정 일기 - 오늘의 하루는 어땠나요?</title>
    <meta name="description" content="AI가 당신의 소중한 하루와 감정을 분석하고 보듬어주는 인공지능 감정 일기입니다.">
    <!-- Google Fonts: Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="/favicon.png">


</head>

<body>
    <!-- Auth Section -->
    <div id="auth-container" class="auth-container">
        <div class="auth-card glass">
            <h1>AI 감정 일기</h1>
            <p class="auth-subtitle">오늘 당신의 마음을 기록해보세요.</p>

            <div class="auth-form">
                <div class="input-group">
                    <label for="auth-email">이메일</label>
                    <input type="email" id="auth-email" placeholder="example@email.com">
                </div>
                <div class="input-group">
                    <label for="auth-password">비밀번호</label>
                    <input type="password" id="auth-password" placeholder="********">
                </div>

                <div class="auth-buttons">
                    <button id="login-btn" class="btn btn-primary">로그인</button>
                    <button id="signup-btn" class="btn btn-secondary">회원가입</button>
                </div>

                <div class="divider">
                    <span>또는</span>
                </div>

                <button id="google-login-btn" class="btn btn-google">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
                        alt="Google icon">
                    Google로 로그인
                </button>

            </div>
        </div>
    </div>

    <div id="app-container" class="app-container" style="display: none;">

        <header>
            <div class="header-top">
                <div class="user-info" id="user-info" style="display: none;">
                    <span id="user-email"></span>
                    <button id="logout-btn" class="logout-link">로그아웃</button>
                </div>
                <div class="theme-toggle-container">
                    <button id="theme-toggle" class="theme-btn" aria-label="테마 전환">
                        <i data-lucide="sun" id="theme-icon"></i>
                    </button>
                </div>
            </div>

            <h1 id="main-title">오늘의하루는 어땠나요?</h1>
            <p class="subtitle">당신의 소중한 이야기를 들려주세요.</p>
        </header>


        <main>
            <section class="input-section">
                <textarea id="diary-input" placeholder="이곳에 오늘 있었던 일과 느꼈던 마음을 자유롭게 적어보세요..."
                    spellcheck="false"></textarea>

                <div class="button-group">
                    <button id="voice-btn" class="btn btn-secondary">
                        <i data-lucide="mic"></i>
                        음성으로 입력하기
                    </button>
                    <button id="analyze-btn" class="btn btn-primary">
                        <i data-lucide="sparkles"></i>
                        분석 요청하기
                    </button>
                </div>
            </section>

            <section class="response-section">
                <h2 id="response-subtitle">AI의 답변</h2>
                <div id="ai-response-box" class="response-box">
                    <p id="ai-text">여기에 AI의 답변이 표시됩니다.</p>
                </div>
            </section>

            <section class="stats-section">
                <h2 id="stats-subtitle">마음 통계</h2>
                <div class="stats-container">
                    <canvas id="emotion-chart"></canvas>
                </div>
            </section>

            <section class="history-section">
                <h2 id="history-subtitle">지난 일기 기록</h2>
                <div id="history-list" class="history-list">
                    <!-- 기록이 여기에 추가됩니다 -->
                </div>
            </section>

            <section class="chat-section">
                <div class="chat-header">
                    <h2 id="chat-subtitle">실시간 채팅</h2>
                    <div class="chat-profile">
                        <div class="avatar-wrapper" id="profile-upload-trigger">
                            <img id="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=default"
                                alt="Profile">
                            <div class="avatar-overlay">
                                <i data-lucide="camera"></i>
                            </div>
                        </div>
                        <button id="change-photo-btn" class="text-btn">사진 변경</button>
                        <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                    </div>
                </div>

                <div class="chat-container glass">
                    <div id="chat-messages" class="chat-messages">
                        <p class="welcome-msg">따뜻한 위로와 응원을 나누어 보세요.</p>
                    </div>

                    <div class="chat-input-group">
                        <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." autocomplete="off">
                        <button id="chat-send-btn" class="btn btn-primary">
                            <i data-lucide="send"></i>
                            전송
                        </button>
                    </div>
                </div>
            </section>

        </main>


        <footer>
            <p>© 2026 AI 감정 일기. 마음을 나누는 따뜻한 기술.</p>
        </footer>
    </div>

    <!-- Modal Section -->
    <div id="custom-modal" class="modal-overlay" style="display: none;">
        <div class="modal-card glass">
            <div class="modal-content">
                <i data-lucide="info" class="modal-icon"></i>
                <p id="modal-message"></p>
                <button id="modal-close-btn" class="btn btn-primary">확인</button>
            </div>
        </div>
    </div>

    <script type="module" src="/script.js"></script>


    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>

</html>
